{% extends "base.html" %}
{% block title %}لعبة النرد{% endblock %}
{% block content %}
<h2>🎲 لعبة النرد</h2>
<p>رصيدك: <strong id="balance">{{ "%.2f"|format(current_user.balance) }}</strong></p>
<div class="game-container">
    <div class="dice-result" id="dice-result">🎲</div>
    <p id="message"></p>
    <div class="mb-3"><label>الرهان</label><input type="number" id="bet" class="form-control" min="1" max="500" value="10"></div>
    <div class="mb-3"><label>خمن الرقم (1-6)</label><input type="number" id="guess" class="form-control" min="1" max="6" value="1"></div>
    <button class="btn btn-primary btn-lg" onclick="play()">🎲 ارم النرد</button>
</div>
<script>
function play() {
    fetch('/game/dice', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bet:document.getElementById('bet').value,guess:document.getElementById('guess').value})})
    .then(r=>r.json()).then(d=>{
        document.getElementById('dice-result').textContent = '🎲' + d.result;
        document.getElementById('message').textContent = d.message || (d.won?'ربحت!':'خسرت!');
        document.getElementById('balance').textContent = d.new_balance.toFixed(2);
    });
}
</script>
{% endblock %}
